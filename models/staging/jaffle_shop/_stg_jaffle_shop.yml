models:
  - name: stg_jaffle_shop_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
  - name: stg_jaffle_shop_orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned','return_pending']
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id